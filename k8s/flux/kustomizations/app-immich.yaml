apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespace
    - name: cloudnative-pg
    - name: storage
    - name: infra-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/apps/immich
  prune: true
  wait: true
