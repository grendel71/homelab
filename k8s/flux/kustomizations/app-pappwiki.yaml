apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pappwiki
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/apps/pappwiki
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
