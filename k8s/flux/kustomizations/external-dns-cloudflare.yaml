---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns-cloudflare
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/external-dns-cloudflare
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: envoy-gateway
    - name: namespace
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: external-dns-cloudflare
      namespace: external-dns
