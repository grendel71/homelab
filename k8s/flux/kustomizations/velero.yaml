apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/velero
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: infra-secrets
    - name: namespace
---
