---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-releases
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./k8s/infra/releases
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sources
    - name: namespace
    - name: infra-secrets
  timeout: 3m0s
  wait: true
