apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-internal
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespace
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/traefik
  prune: true
  wait: true
  timeout: 5m
---
