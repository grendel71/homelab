# clusters/homelab/infrastructure/cert-manager-issuers.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nextcloud
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: namespace
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/apps/nextcloud
  prune: true
  timeout: 5m
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
