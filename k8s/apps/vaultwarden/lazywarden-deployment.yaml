---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazywarden
  namespace: vaultwarden
  labels:
    app: lazywarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazywarden
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: lazywarden
    spec:
      containers:
        - name: lazywarden
          image: querylab/lazywarden:latest
          imagePullPolicy: Always
          env:
            - name: UNLOCK_VAULT
              value: "true"
          envFrom:
            - secretRef:
                name: lazywarden-secret-env
          volumeMounts:
            - name: config
              mountPath: /root/lazywarden/config
            - name: backup
              mountPath: /root/lazywarden/backup-drive
              subPath: lazywarden
            - name: dotenv
              mountPath: /app/.env
              subPath: dotenv
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: lazywarden-config-pvc
        - name: backup
          persistentVolumeClaim:
            claimName: lazywarden-backup-pvc
        - name: dotenv
          secret:
            secretName: lazywarden-secret-env
            items:
              - key: dotenv
                path: dotenv
