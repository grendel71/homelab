---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lazywarden-config-pvc
  namespace: vaultwarden
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: replicated-x3-block-store
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi
