---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bw-portal
  namespace: vaultwarden
  labels:
    app: bw-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bw-portal
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: bw-portal
    spec:
      containers:
        - name: bw-portal
          image: reaper0x1/bitwarden-portal:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: bw-portal-secret
          volumeMounts:
            - name: backups
              mountPath: /app/backups
              subPath: bw-portal
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: bw-portal-backup-pvc
