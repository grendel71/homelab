apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: jellyfin
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: apps
      interval: 12h
  values:
    ingress:
      enabled: false
    runtimeClassName: nvidia
    nodeSelector:
      nvidia.com/gpu.present: "true"
    #securityContext:
    #  privileged: true
    resources:
      limits:
        nvidia.com/gpu: "1"
    extraVolumes:
      - name: dri
        hostPath:
          path: /dev/dri

    extraVolumeMounts:
      - name: dri
        mountPath: /dev/dri
    persistence:
      config:
        enabled: true
        size: "5Gi"
        storageClass: "replicated-x3-block-store"
      media:
        enabled: true
        existingClaim: "grendel-jellyfin-pvc"
