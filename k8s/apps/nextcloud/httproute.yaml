---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nextcloud-external
  namespace: nextcloud-new
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: envoy-external
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - nextcloud.grendel71.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: nextcloud-backend
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: nextcloud-backend
  namespace: nextcloud-new
spec:
  endpoints:
    - fqdn:
        hostname: nextcloud-service.nextcloud-new.svc.cluster.local
        port: 443
  tls:
    insecureSkipVerify: true
