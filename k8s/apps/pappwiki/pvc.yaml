apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pappwiki-db-pvc
  namespace: pappwiki
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: replicated-x3-block-store
  volumeMode: Filesystem
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pappwiki-images-pvc
  namespace: pappwiki
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: replicated-x3-block-store
  volumeMode: Filesystem
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pappwiki-extensions-pvc
  namespace: pappwiki
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: replicated-x3-block-store
  volumeMode: Filesystem
  resources:
    requests:
      storage: 512Mi
