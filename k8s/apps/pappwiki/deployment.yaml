apiVersion: apps/v1
kind: Deployment
metadata:
  name: pappwiki
  namespace: pappwiki
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pappwiki
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: pappwiki
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z pappwiki-db-svc 3306; do echo waiting for database; sleep 2; done",
            ]
        - name: init-cache
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "mkdir -p /var/www/html/images/cache && chown -R 33:33 /var/www/html/images/cache",
            ]
          volumeMounts:
            - name: images
              mountPath: /var/www/html/images
        - name: install-oidc-extensions
          image: mediawiki:1.41
          command:
            - /bin/bash
            - -c
            - |
              set -e
              cd /extensions-data
              if [ ! -d "PluggableAuth" ]; then
                echo "Downloading PluggableAuth..."
                curl -sL https://extdist.wmflabs.org/dist/extensions/PluggableAuth-REL1_41-572ede7.tar.gz | tar xz
              fi
              if [ ! -d "OpenIDConnect" ]; then
                echo "Downloading OpenIDConnect..."
                curl -sL https://extdist.wmflabs.org/dist/extensions/OpenIDConnect-REL1_41-94dc370.tar.gz | tar xz
              fi
              chown -R 33:33 /extensions-data
              echo "Extensions ready"
          volumeMounts:
            - name: extensions
              mountPath: /extensions-data
      containers:
        - name: mediawiki
          image: mediawiki:1.41
          ports:
            - containerPort: 80
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: pappwiki-db-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: pappwiki-db-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pappwiki-db-secret
                  key: MYSQL_PASSWORD
            - name: MW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pappwiki-secret
                  key: secretKey
            - name: MW_UPGRADE_KEY
              valueFrom:
                secretKeyRef:
                  name: pappwiki-secret
                  key: upgradeKey
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: pappwiki-oidc-secret
                  key: clientId
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pappwiki-oidc-secret
                  key: clientSecret
          volumeMounts:
            - name: images
              mountPath: /var/www/html/images
            - name: config
              mountPath: /var/www/html/LocalSettings.php
              subPath: LocalSettings.php
            - name: config
              mountPath: /usr/local/etc/php/conf.d/php-performance.ini
              subPath: php-performance.ini
            - name: extensions
              mountPath: /var/www/html/extensions/PluggableAuth
              subPath: PluggableAuth
            - name: extensions
              mountPath: /var/www/html/extensions/OpenIDConnect
              subPath: OpenIDConnect
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: images
          persistentVolumeClaim:
            claimName: pappwiki-images-pvc
        - name: extensions
          persistentVolumeClaim:
            claimName: pappwiki-extensions-pvc
        - name: config
          configMap:
            name: pappwiki-config
