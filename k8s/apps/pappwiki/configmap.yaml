apiVersion: v1
kind: ConfigMap
metadata:
  name: pappwiki-config
  namespace: pappwiki
data:
  php-performance.ini: |
    ; OPcache settings for better performance
    opcache.enable=1
    opcache.memory_consumption=256
    opcache.interned_strings_buffer=16
    opcache.max_accelerated_files=10000
    opcache.revalidate_freq=60
    opcache.fast_shutdown=1
    opcache.enable_cli=1

    ; APCu settings
    apc.shm_size=128M
    apc.ttl=7200
    apc.enable_cli=1

    ; PHP memory and performance
    memory_limit=512M
    max_execution_time=60
    realpath_cache_size=4096K
    realpath_cache_ttl=600

  LocalSettings.php: |
    <?php
    # This file was automatically generated by the MediaWiki 1.41.0
    # installer. If you make manual changes, please keep track in case you
    # need to recreate them later.

    # Protect against web entry
    if ( !defined( 'MEDIAWIKI' ) ) {
      exit;
    }

    $wgSitename = "PAPP";

    ## The URL base path to the directory containing the wiki;
    $wgScriptPath = "";

    ## The protocol and server name to use in fully-qualified URLs
    $wgServer = "https://papp.k8s.local.grendel71.net";

    ## The URL path to static resources (images, scripts, etc.)
    $wgResourceBasePath = $wgScriptPath;

    $wgLogos = [
      '1x' => "$wgResourceBasePath/resources/assets/change-your-logo.svg",
      'icon' => "$wgResourceBasePath/resources/assets/change-your-logo.svg",
    ];

    ## UPO means: this is also a user preference option
    $wgEnableEmail = true;
    $wgEnableUserEmail = true;

    $wgEmergencyContact = "";
    $wgPasswordSender = "";

    $wgEnotifUserTalk = false;
    $wgEnotifWatchlist = false;
    $wgEmailAuthentication = true;

    ## Database settings
    $wgDBtype = "mysql";
    $wgDBserver = "pappwiki-db-svc";
    $wgDBname = getenv('MYSQL_DATABASE') ?: "papp_wiki";
    $wgDBuser = getenv('MYSQL_USER') ?: "papp";
    $wgDBpassword = getenv('MYSQL_PASSWORD') ?: "";

    # MySQL specific settings
    $wgDBprefix = "";
    $wgDBssl = false;
    $wgDBTableOptions = "ENGINE=InnoDB, DEFAULT CHARSET=binary";

    $wgSharedTables[] = "actor";

    ## Caching - Performance Optimizations
    $wgMainCacheType = CACHE_ACCEL;
    $wgSessionCacheType = CACHE_DB;
    $wgMessageCacheType = CACHE_ACCEL;
    $wgParserCacheType = CACHE_ACCEL;
    $wgLanguageConverterCacheType = CACHE_ACCEL;
    $wgMemCachedServers = [];

    # File cache for faster page loads
    $wgUseFileCache = true;
    $wgFileCacheDirectory = "/var/www/html/images/cache";
    $wgShowIPinHeader = false;

    # Cache expiry times
    $wgCacheEpoch = max( $wgCacheEpoch, gmdate( 'YmdHis' ) );
    $wgParserCacheExpireTime = 86400 * 7;
    $wgObjectCacheSessionExpiry = 86400;

    # Sidebar cache
    $wgEnableSidebarCache = true;
    $wgSidebarCacheExpiry = 86400;

    # Resource loader caching
    $wgResourceLoaderMaxage = [
      'versioned' => 30 * 24 * 60 * 60,
      'unversioned' => 5 * 60
    ];

    # Disable expensive parser functions limits for better template performance
    $wgExpensiveParserFunctionLimit = 500;

    # Job queue - run jobs asynchronously
    $wgJobRunRate = 0;
    $wgRunJobsAsync = true;

    ## To enable image uploads, make sure the 'images' directory
    ## is writable, then set this to true:
    $wgEnableUploads = true;
    $wgUseImageMagick = true;
    $wgImageMagickConvertCommand = "/usr/bin/convert";

    # InstantCommons allows wiki to use images from https://commons.wikimedia.org
    $wgUseInstantCommons = false;

    $wgPingback = false;

    # Site language code
    $wgLanguageCode = "en";

    # Time zone
    $wgLocaltimezone = "UTC";

    $wgSecretKey = getenv('MW_SECRET_KEY') ?: "";
    $wgAuthenticationTokenVersion = "1";
    $wgUpgradeKey = getenv('MW_UPGRADE_KEY') ?: "";

    $wgRightsPage = "";
    $wgRightsUrl = "";
    $wgRightsText = "";
    $wgRightsIcon = "";

    $wgDiff3 = "/usr/bin/diff3";

    # Permissions
    $wgGroupPermissions['*']['createaccount'] = true;
    $wgGroupPermissions['*']['autocreateaccount'] = true;
    $wgGroupPermissions['*']['edit'] = false;
    $wgGroupPermissions['*']['read'] = false;

    ## Default skin
    $wgDefaultSkin = "monobook";

    # Enabled skins
    wfLoadSkin( 'MinervaNeue' );
    wfLoadSkin( 'MonoBook' );
    wfLoadSkin( 'Timeless' );
    wfLoadSkin( 'Vector' );

    # Enabled extensions (only those available in official image)
    wfLoadExtension( 'VisualEditor' );
    wfLoadExtension( 'Scribunto' );
    $wgScribuntoDefaultEngine = 'luastandalone';
    wfLoadExtension( 'ParserFunctions' );
    wfLoadExtension( 'WikiEditor' );
    wfLoadExtension( 'CategoryTree' );
    wfLoadExtension( 'Cite' );
    wfLoadExtension( 'TextExtracts' );
    wfLoadExtension( 'PageImages' );
    wfLoadExtension( 'CodeEditor' );
    wfLoadExtension( 'SyntaxHighlight_GeSHi' );

    # OIDC Authentication via Authentik
    wfLoadExtension( 'PluggableAuth' );
    wfLoadExtension( 'OpenIDConnect' );

    # PluggableAuth 7.x configuration
    $wgPluggableAuth_Config['authentik'] = [
      'plugin' => 'OpenIDConnect',
      'buttonLabel' => 'Login with Authentik',
      'data' => [
        'providerURL' => 'https://ak.grendel71.net/application/o/mediawiki/',
        'clientID' => getenv('OIDC_CLIENT_ID'),
        'clientsecret' => getenv('OIDC_CLIENT_SECRET'),
        'scope' => ['openid', 'profile', 'email', 'groups'],
        'preferred_username' => 'preferred_username',
      ],
      'groupsyncs' => [
        'default' => [
          'type' => 'syncall',
          'groupAttributeName' => 'groups',
          'locallyManaged' => [],
          'groupNameModificationCallback' => function( $groupName ) {
            $map = [
              'authentik Admins' => 'sysop',
            ];
            return $map[$groupName] ?? $groupName;
          },
        ],
      ],
    ];

    $wgPluggableAuth_EnableLocalLogin = true;

    # Auto-create accounts for OIDC users
    $wgGroupPermissions['*']['autocreateaccount'] = true;
    $wgGroupPermissions['*']['createaccount'] = false;
