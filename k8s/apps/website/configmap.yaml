apiVersion: v1
kind: ConfigMap
metadata:
  name: website-caddyfile
  namespace: apps
data:
  Caddyfile: |
    :80 {
        route {
            @dir {
                not path *.*
                not path */
            }
            rewrite @dir {path}/index.html

            reverse_proxy http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local
        }
    }
