apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: apps
spec:
  interval: 30m
  chart:
    spec:
      chart: open-webui
      version: "13.0.1"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: flux-system
      interval: 12h
  values:
    ingress:
      enabled: true
      class: "traefik-internal"
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        cert-manager.io/cluster-issuer: "letsencrypt-production"
      host: "open-webui.k8s.local.grendel71.net"
      tls: true
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "replicated-x3-block-store"
    ollama:
      enabled: false
