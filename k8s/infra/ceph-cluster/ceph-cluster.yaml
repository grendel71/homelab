---
apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v18.2.4
    allowUnsupported: false
  
  dataDirHostPath: /var/lib/rook
  
  mon:
    count: 2
    allowMultiplePerNode: false

  cephConfig:
    global:
      osd_pool_default_size: "2"

  dashboard:
    enabled: true
   
  storage:
    useAllNodes: true
    useAllDevices: true
  
  placement:
    all:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
