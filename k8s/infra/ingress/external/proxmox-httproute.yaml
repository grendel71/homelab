---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pve-ryzen
  namespace: kube-system
spec:
  parentRefs:
    - name: envoy-internal
      namespace: envoy-gateway-system
      sectionName: websecure
  hostnames:
    - pve.envoy.grendel71.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          port: pve-ryzen-backend
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: pve-ryzen-backend
  namespace: kube-system
spec:
  endpoints:
    - fqdn:
        hostname: 192.168.1.156
        port: 8006
  tls:
    insecureSkipVerify: true
