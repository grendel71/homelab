---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: bw-portal-backup-pv-nfs
spec:
  capacity:
    storage: 4Ti
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: slow
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:
    path: /mnt/grendel/subvol-400-disk-0
    server: 192.168.1.231
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bw-portal-backup-pvc
  namespace: vaultwarden
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: slow
  volumeName: bw-portal-backup-pv-nfs
  volumeMode: Filesystem
  resources:
    requests:
      storage: 4Ti
