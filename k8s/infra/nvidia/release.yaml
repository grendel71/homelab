apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: gpu-operator
spec:
  chart:
    spec:
      chart: gpu-operator
      version: 26.3.1
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: gpu-operator
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    hostPaths:
      driverInstallDir: /usr/local
    devicePlugin:
      enabled: true
      config:
        name: time-slicing-config-all
        default: any
