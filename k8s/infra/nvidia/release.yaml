apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: gpu-operator
spec:
  chart:
    spec:
      chart: gpu-operator
      version: 25.10.1
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
  interval: 15m
  timeout: 5m
  releaseName: gpu-operator
  values:
    hostPaths:
      driverInstallDir: /
    driver:
      enabled: false
    toolkit:
      enabled: false
    devicePlugin:
      enabled: true
      config:
        name: time-slicing-config-all
        default: any
    dcgmExporter:
      enabled: false
    gfd:
      enabled: true
    migManager:
      enabled: false
    nfd:
      enabled: true
    validator:
      env:
        - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
          value: "true"
    sandboxDevicePlugin:
      enabled: false
    vfioManager:
      enabled: false
    vgpuDeviceManager:
      enabled: false
