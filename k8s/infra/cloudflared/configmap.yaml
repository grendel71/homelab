---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    # Cloudflare Tunnel configuration
    # Tunnel ID must match the credentials file
    tunnel: f53f1d5a-e787-4147-ab1c-ed9002200cdf

    # Don't try to auto-update
    no-autoupdate: true

    # Metrics server
    metrics: 0.0.0.0:2000

    # Ingress rules - route traffic to Traefik external
    ingress:
      # Route *.grendel71.net subdomains to Traefik external gateway
      - hostname: "*.grendel71.net"
        service: https://192.168.1.67:443
        originRequest:
          noTLSVerify: true

      # Route base domain
      - hostname: "grendel71.net"
        service: https://192.168.1.67:443
        originRequest:
          noTLSVerify: true

      # Catch-all (required)
      - service: http_status:404
